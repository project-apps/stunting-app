<!DOCTYPE html>
<html>
<head>
  <title>Stunting App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #F4F4F4;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #77DD77, #5fcf5f);
      padding: 20px;
      color: white;
    }

    .sidebar h4 {
      font-weight: bold;
    }

    .menu {
      margin-top: 30px;
    }

    .menu a {
      display: block;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .menu a:hover,
    .menu a.active {
      background: rgba(255,255,255,0.2);
    }

    /* CONTENT */
    .content {
      margin-left: 260px;
      padding: 25px;
    }

    /* TOPBAR */
    .topbar {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* CARD */
    .card-custom {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    /* STAT CARD */
    .stat-card {
      padding: 15px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      text-align: center;
    }

    .stat-card h3 {
      margin: 0;
      color: #77DD77;
    }

    /* BUTTON */
    .btn-main {
      background: #77DD77;
      border: none;
    }

    .btn-main:hover {
      background: #5fcf5f;
    }

    /* TOAST */
    .toast-custom {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Stunting App</h4>

  <div class="menu">
    <a onclick="setActive(this);loadPage('home')" class="active">Home</a>
    <a onclick="setActive(this);loadPage('input')">Input</a>
    <a onclick="setActive(this);loadPage('rekomendasi')">Rekomendasi</a>
    <a onclick="setActive(this);loadPage('dashboard')">Dashboard</a>
    <a onclick="setActive(this);loadPage('edukasi')">Edukasi</a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="topbar">
    <h5 id="title">Home</h5>
  </div>

  <div id="app"></div>

</div>

<div id="toast" class="toast-custom"></div>

<script>
// ACTIVE MENU
function setActive(el) {
  document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// LOAD PAGE
function loadPage(page) {
  document.getElementById('title').innerText = page.toUpperCase();

  // HOME
  if (page === 'home') {
    app.innerHTML = `
      <div class="card-custom">
        <h4>Tips Gizi Anak</h4>
        <ul>
          <li>Protein hewani setiap hari</li>
          <li>Sayur & buah wajib</li>
          <li>Perhatikan mikrobiota usus</li>
          <li>Hindari gula berlebih</li>
        </ul>
      </div>
    `;
  }

  // INPUT
  if (page === 'input') {
    app.innerHTML = `
      <div class="card-custom">
        <h4>Input Data Anak</h4>
        <form id="form">
          <input class="form-control mb-2" placeholder="Nama" id="nama">
          <input class="form-control mb-2" placeholder="Umur" id="umur">
          <input class="form-control mb-2" placeholder="BB" id="bb">
          <input class="form-control mb-2" placeholder="TB" id="tb">
          <button class="btn btn-main w-100">Simpan</button>
        </form>
      </div>
    `;

    form.onsubmit = async (e) => {
      e.preventDefault();

      await fetch('/child', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          nama: nama.value,
          umur: umur.value,
          bb: bb.value,
          tb: tb.value
        })
      });

      showToast("Data tersimpan");
    };
  }

  // REKOMENDASI
  if (page === 'rekomendasi') {
    app.innerHTML = `
      <div class="card-custom">
        <h4>Rekomendasi Menu</h4>
        <button class="btn btn-main mb-3" onclick="ambil()">Ambil</button>
        <ul id="menu" class="list-group"></ul>
      </div>
    `;
  }

  // DASHBOARD
  if (page === 'dashboard') {
    app.innerHTML = `
      <div class="d-flex justify-content-between mb-3">
      <h4>Dashboard</h4>
      <button onclick="window.open('/report')" class="btn btn-main">
  📄 Export Laporan
</button>
    </div>
	
	  <div class="row">
        <div class="col-md-4">
          <div class="stat-card">
            <h6>BB Terakhir</h6>
            <h3 id="bb"></h3>
          </div>
        </div>
      </div>

      <div class="card-custom">
        <canvas id="chart"></canvas>
      </div>
    `;

    loadChart();
  }

  // EDUKASI
  if (page === 'edukasi') {
    app.innerHTML = `
      <div class="card-custom">
        <h4>Edukasi</h4>
        <p>Konten edukasi gizi anak...</p>
      </div>
    `;
  }
}

// REKOMENDASI
async function ambil() {
  const res = await fetch('/child');
  const data = await res.json();
  const last = data[data.length-1];

  const r = await fetch(`/recommendation?bb=${last.bb}&tb=${last.tb}`);
  const menuData = await r.json();

  menu.innerHTML = "";
  menuData.forEach(m => {
    menu.innerHTML += `<li class="list-group-item">${m}</li>`;
  });
}

// CHART
async function loadChart() {
  const res = await fetch('/child');
  const data = await res.json();

  const labels = data.map(d => d.created_at);
  const bbData = data.map(d => d.bb);

  new Chart(chart, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{ label: 'BB', data: bbData }]
    }
  });

  bb.innerText = bbData[bbData.length-1];
}

// DEFAULT
loadPage('home');
</script>

</body>
</html>
